name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Install project with dev dependencies
      - run: pip install -e ".[dev]"
      # Run test suite with 70% coverage gate
      - run: pytest
